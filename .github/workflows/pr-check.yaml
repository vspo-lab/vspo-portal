name: PR Check

on:
  pull_request:
    paths:
      - 'service/vspo-schedule/v2/web/**'
      - 'service/bot-dashboard/**'
      - 'packages/**'
      - 'docs/**'
      - 'README.md'
      - '.github/workflows/pr-check.yaml'

permissions:
  contents: read
  pull-requests: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      bot-dashboard: ${{ steps.filter.outputs.bot-dashboard }}
      packages: ${{ steps.filter.outputs.packages }}
      docs: ${{ steps.filter.outputs.docs }}
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'service/vspo-schedule/v2/web/**'
            bot-dashboard:
              - 'service/bot-dashboard/**'
            packages:
              - 'packages/**'
            docs:
              - 'docs/**'
              - 'README.md'
              - '.github/**/*.md'
            code:
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.jsx'
              - '**/*.json'

  biome-check:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Setup PNPM
        uses: ./.github/actions/setup-pnpm
      - name: Biome Check
        run: pnpm biome:check

  typescript-check:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Setup PNPM
        uses: ./.github/actions/setup-pnpm
      - name: TypeScript Check
        run: pnpm tsc

  knip-check:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Setup PNPM
        uses: ./.github/actions/setup-pnpm
      - name: Knip Check
        run: pnpm knip

  textlint-check:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Setup PNPM
        uses: ./.github/actions/setup-pnpm
        with:
          build: 'false'
      - name: Textlint Check
        run: pnpm textlint

  markdownlint-check:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Setup PNPM
        uses: ./.github/actions/setup-pnpm
        with:
          build: 'false'
      - name: Markdownlint Check
        run: pnpm markdownlint

  cspell-check:
    needs: changes
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Setup PNPM
        uses: ./.github/actions/setup-pnpm
        with:
          build: 'false'
      - name: Spell Check
        run: pnpm cspell

  bundle-size:
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.packages == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Setup PNPM
        uses: ./.github/actions/setup-pnpm
      - name: Build web app
        run: pnpm --filter vspo-schedule-v2-web exec next build
        env:
          NEXT_PUBLIC_SITE_URL: "https://www.vspo-portal.com"
      - name: Analyze bundle
        run: cd service/vspo-schedule/v2/web && npx -p nextjs-bundle-analysis report
      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: bundle
          path: service/vspo-schedule/v2/web/.next/analyze/__bundle_analysis.json

  test:
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs['bot-dashboard'] == 'true' || needs.changes.outputs.packages == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      web-result: ${{ steps.web-test.outcome }}
      web-summary: ${{ steps.web-test.outputs.summary }}
      bot-result: ${{ steps.bot-test.outcome }}
      bot-summary: ${{ steps.bot-test.outputs.summary }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup PNPM
        uses: ./.github/actions/setup-pnpm
        with:
          build: 'false'
      - name: Build package dependencies
        run: pnpm --filter "@vspo-lab/*" build

      - name: Test web (schedule)
        id: web-test
        if: needs.changes.outputs.web == 'true' || needs.changes.outputs.packages == 'true'
        run: |
          cd service/vspo-schedule/v2/web
          pnpm test:coverage 2>&1 | tee /tmp/web-test-output.txt
          # Extract summary line
          TESTS=$(grep "Tests" /tmp/web-test-output.txt | tail -1)
          FILES=$(grep "Test Files" /tmp/web-test-output.txt | tail -1)
          COVERAGE=$(grep "All files" /tmp/web-test-output.txt | head -1 | sed 's/\x1b\[[0-9;]*m//g' | awk -F'|' '{printf "Stmts: %s / Branch: %s / Funcs: %s / Lines: %s", $2, $3, $4, $5}')
          echo "summary=${FILES} | ${TESTS} | ${COVERAGE}" >> "$GITHUB_OUTPUT"

      - name: Test bot-dashboard
        id: bot-test
        if: needs.changes.outputs['bot-dashboard'] == 'true' || needs.changes.outputs.packages == 'true'
        run: |
          cd service/bot-dashboard
          pnpm test:coverage 2>&1 | tee /tmp/bot-test-output.txt
          TESTS=$(grep "Tests" /tmp/bot-test-output.txt | tail -1)
          FILES=$(grep "Test Files" /tmp/bot-test-output.txt | tail -1)
          COVERAGE=$(grep "All files" /tmp/bot-test-output.txt | head -1 | sed 's/\x1b\[[0-9;]*m//g' | awk -F'|' '{printf "Stmts: %s / Branch: %s / Funcs: %s / Lines: %s", $2, $3, $4, $5}')
          echo "summary=${FILES} | ${TESTS} | ${COVERAGE}" >> "$GITHUB_OUTPUT"

      - name: Upload coverage (web)
        if: always() && steps.web-test.outcome == 'success'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: service/vspo-schedule/v2/web/coverage/coverage-final.json
          flags: web
          fail_ci_if_error: false
      - name: Upload coverage (bot-dashboard)
        if: always() && steps.bot-test.outcome == 'success'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: service/bot-dashboard/coverage/coverage-final.json
          flags: bot-dashboard
          fail_ci_if_error: false

  # Post a summary comment on the PR with all check results
  pr-summary:
    needs: [changes, biome-check, typescript-check, knip-check, textlint-check, markdownlint-check, cspell-check, bundle-size, test]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Build summary comment
        id: summary
        env:
          BIOME: ${{ needs.biome-check.result }}
          TSC: ${{ needs.typescript-check.result }}
          KNIP: ${{ needs.knip-check.result }}
          TEXTLINT: ${{ needs.textlint-check.result }}
          MARKDOWNLINT: ${{ needs.markdownlint-check.result }}
          CSPELL: ${{ needs.cspell-check.result }}
          BUNDLE: ${{ needs.bundle-size.result }}
          TEST: ${{ needs.test.result }}
          WEB_SUMMARY: ${{ needs.test.outputs.web-summary }}
          BOT_SUMMARY: ${{ needs.test.outputs.bot-summary }}
        run: |
          icon() {
            case "$1" in
              success) echo "✅";;
              failure) echo "❌";;
              skipped) echo "⏭️";;
              cancelled) echo "🚫";;
              *) echo "⬜";;
            esac
          }

          {
            echo "## PR Check Summary"
            echo ""
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| Biome (lint + format) | $(icon "$BIOME") ${BIOME} |"
            echo "| TypeScript | $(icon "$TSC") ${TSC} |"
            echo "| Knip (unused code) | $(icon "$KNIP") ${KNIP} |"
            echo "| Textlint | $(icon "$TEXTLINT") ${TEXTLINT} |"
            echo "| Markdownlint | $(icon "$MARKDOWNLINT") ${MARKDOWNLINT} |"
            echo "| CSpell | $(icon "$CSPELL") ${CSPELL} |"
            echo "| Bundle Size | $(icon "$BUNDLE") ${BUNDLE} |"
            echo "| Tests | $(icon "$TEST") ${TEST} |"
            echo ""

            if [ -n "$WEB_SUMMARY" ] || [ -n "$BOT_SUMMARY" ]; then
              echo "### Test Results"
              echo ""
              if [ -n "$WEB_SUMMARY" ]; then
                echo "**Schedule (web):** ${WEB_SUMMARY}"
              fi
              if [ -n "$BOT_SUMMARY" ]; then
                echo "**Bot Dashboard:** ${BOT_SUMMARY}"
              fi
              echo ""
            fi
          } > /tmp/pr-comment.md

          cat /tmp/pr-comment.md

          # Set multiline output
          {
            echo "body<<ENDOFCOMMENT"
            cat /tmp/pr-comment.md
            echo "ENDOFCOMMENT"
          } >> "$GITHUB_OUTPUT"

      - name: Find existing comment
        uses: peter-evans/find-comment@v3
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: 'PR Check Summary'

      - name: Post or update PR comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.summary.outputs.body }}
          edit-mode: replace
