name: PR Check

on:
  pull_request:
    paths:
      - 'service/vspo-schedule/v2/web/**'
      - 'service/bot-dashboard/**'
      - 'packages/**'
      - 'docs/**'
      - 'README.md'
      - '.github/workflows/pr-check.yaml'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      bot-dashboard: ${{ steps.filter.outputs.bot-dashboard }}
      packages: ${{ steps.filter.outputs.packages }}
      docs: ${{ steps.filter.outputs.docs }}
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'service/vspo-schedule/v2/web/**'
            bot-dashboard:
              - 'service/bot-dashboard/**'
            packages:
              - 'packages/**'
            docs:
              - 'docs/**'
              - 'README.md'
              - '.github/**/*.md'
            code:
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.jsx'
              - '**/*.json'

  biome-check:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Setup PNPM
        uses: ./.github/actions/setup-pnpm
      - name: Biome Check
        run: pnpm biome:check

  typescript-check:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Setup PNPM
        uses: ./.github/actions/setup-pnpm
      - name: TypeScript Check
        run: pnpm tsc

  knip-check:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Setup PNPM
        uses: ./.github/actions/setup-pnpm
      - name: Knip Check
        run: pnpm knip

  textlint-check:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Setup PNPM
        uses: ./.github/actions/setup-pnpm
        with:
          build: 'false'
      - name: Textlint Check
        run: pnpm textlint

  markdownlint-check:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Setup PNPM
        uses: ./.github/actions/setup-pnpm
        with:
          build: 'false'
      - name: Markdownlint Check
        run: pnpm markdownlint

  cspell-check:
    needs: changes
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Setup PNPM
        uses: ./.github/actions/setup-pnpm
        with:
          build: 'false'
      - name: Spell Check
        run: pnpm cspell

  bundle-size:
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.packages == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Setup PNPM
        uses: ./.github/actions/setup-pnpm
      - name: Build web app
        run: pnpm --filter vspo-schedule-v2-web exec next build
        env:
          NEXT_PUBLIC_SITE_URL: "https://www.vspo-portal.com"
      - name: Analyze bundle
        run: cd service/vspo-schedule/v2/web && npx -p nextjs-bundle-analysis report
      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: bundle
          path: service/vspo-schedule/v2/web/.next/analyze/__bundle_analysis.json

  test:
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs['bot-dashboard'] == 'true' || needs.changes.outputs.packages == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Setup PNPM
        uses: ./.github/actions/setup-pnpm
        with:
          build: 'false'
      - name: Build package dependencies
        run: pnpm --filter "@vspo-lab/*" build
      - name: Run tests with coverage
        run: |
          pnpm --filter vspo-schedule-v2-web test:coverage
          pnpm --filter bot-dashboard test:coverage
      - name: Upload coverage (web)
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: service/vspo-schedule/v2/web/coverage/coverage-final.json
          flags: web
          fail_ci_if_error: false
      - name: Upload coverage (bot-dashboard)
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: service/bot-dashboard/coverage/coverage-final.json
          flags: bot-dashboard
          fail_ci_if_error: false
