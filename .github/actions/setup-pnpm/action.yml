name: 'Setup PNPM'
description: 'Setup Node.js and PNPM with optional build step'
inputs:
  build:
    description: 'Run pnpm build after install'
    required: false
    default: 'true'
runs:
  using: 'composite'
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'

    - name: Set up pnpm
      uses: pnpm/action-setup@v5
      with:
        version: 10.32.1
        run_install: false

    - name: Download deps
      shell: bash
      run: pnpm install

    - name: Package build
      if: inputs.build == 'true'
      shell: bash
      run: pnpm build
